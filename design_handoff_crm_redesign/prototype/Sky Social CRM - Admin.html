<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<title>Sky Social CRM — Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; height:100%; }
  body {
    font-family:'Plus Jakarta Sans', system-ui, sans-serif;
    background:#f4f6ff; color:#1a1c2e;
    -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
  }
  ::-webkit-scrollbar { width:10px; height:10px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:#d4d8ec; border-radius:5px; border:2px solid #f4f6ff; }
  ::-webkit-scrollbar-thumb:hover { background:#b6bce0; }
  button { font-family:inherit; }
  table tr:hover td { background:#fcfdff; }
  input:focus, select:focus { border-color:#6366f1 !important; box-shadow:0 0 0 3px rgba(99,102,241,0.12); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="admin-data.js"></script>
<script type="text/babel" src="admin-layout.jsx"></script>
<script type="text/babel" src="admin-pages-a.jsx"></script>
<script type="text/babel" src="admin-pages-b.jsx"></script>

<script type="text/babel">
const { useState } = React

function AdminApp() {
  const [page, setPage] = useState('dashboard')
  return (
    <div style={{display:'flex', minHeight:'100vh'}} data-screen-label={`Admin · ${page}`}>
      <AdminSidebar active={page} onNavigate={setPage} />
      <main style={{flex:1, minWidth:0, display:'flex', flexDirection:'column'}}>
        {page === 'dashboard' && <AdminDashboard />}
        {page === 'orgs'      && <AdminOrgs />}
        {page === 'users'     && <AdminUsers />}
        {page === 'billing'   && <AdminBilling />}
        {page === 'config'    && <AdminConfig />}
        {page === 'emails'    && <AdminEmails />}
        {page === 'changelog' && <AdminChangelog />}
      </main>
    </div>
  )
}

ReactDOM.createRoot(document.getElementById('root')).render(<AdminApp />)
</script>
</body>
</html>
